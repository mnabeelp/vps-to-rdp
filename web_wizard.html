<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS to RDP Wizard (Web Edition)</title>
    <style>
        :root {
            --bg: #0a0a0d;
            --card: #121217;
            --primary: #3b82f6;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid #303033;
            max-width: 500px;
            width: 100%;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        p { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }
        input {
            width: 100%;
            padding: 12px 16px;
            background-color: #1a1a20;
            border: 1px solid #303033;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #2563eb; }
        .result {
            margin-top: 30px;
            padding: 15px;
            background: #000;
            border-radius: 8px;
            display: none;
            word-break: break-all;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            border: 1px solid #303033;
        }
        .copy-btn { margin-top: 10px; background: #334155; font-size: 12px; padding: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VPS to RDP Wizard</h1>
        <p>Convert any Linux VPS to RDP without downloading files.</p>
        
        <div class="input-group">
            <label>VPS IP Address</label>
            <input type="text" id="ip" placeholder="123.45.67.89">
        </div>
        <div class="input-group">
            <label>SSH Username</label>
            <input type="text" id="user" value="root">
        </div>
        
        <button onclick="generate()">Generate One-Liner</button>
        
        <div id="result-box" class="result">
            <div id="command"></div>
            <button class="copy-btn" onclick="copy()">Copy to Clipboard</button>
        </div>

        <div style="margin-top: 40px; font-size: 12px; color: var(--text-dim);">
            <strong>Instructions:</strong><br>
            1. Generate the command.<br>
            2. Open PowerShell on Windows.<br>
            3. Paste the command and press enter.<br>
            4. Once done, open 'Remote Desktop Connection' and connect.
        </div>
    </div>

    <script>
        function generate() {
            const ip = document.getElementById('ip').value;
            const user = document.getElementById('user').value;
            if(!ip) return alert('Please enter an IP');
            
            const cmd = `ssh ${user}@${ip} "sudo apt update && sudo apt install -y xfce4 xfce4-goodies xrdp && sudo adduser xrdp ssl-cert && echo 'xfce4-session' > ~/.xsession && sudo systemctl restart xrdp && sudo ufw allow 3389/tcp"`;
            
            document.getElementById('command').innerText = cmd;
            document.getElementById('result-box').style.display = 'block';
        }

        function copy() {
            const cmd = document.getElementById('command').innerText;
            navigator.clipboard.writeText(cmd).then(() => {
                alert('Copied to clipboard!');
            });
        }
    </script>
</body>
</html>
